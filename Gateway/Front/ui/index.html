<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
{{ styles }}
</style>
</head>
<body>
  <script>
    window.APP_CONFIG = {{ app_config_json }};
  </script>
  <div class="page">
    <div class="content">
      <div class="hero">
        <img class="hero-avatar" src="data:image/png;base64,{{ avatar_b64 }}" alt="avatar" />
        <h1 class="hero-title" id="hero-title" data-fulltext="我是鑫哥，帮你搞搞数据">
          <span class="hero-reserve">我是鑫哥，帮你搞搞数据</span>
          <span id="hero-text" class="hero-live"></span>
        </h1>
      </div>

      <aside class="settings-panel" id="settings-panel" aria-label="模型设置">
        <button
          id="settings-toggle"
          class="settings-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="settings-body"
          aria-label="打开设置"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="settings-body" id="settings-body">
          <div class="settings-field">
            <span class="settings-label">Model</span>
            <div id="model-options" class="settings-options" role="listbox" aria-label="选择模型"></div>
          </div>
        </div>
      </aside>

      <div class="input-wrap">
        <div class="input-box">
          <input id="chat-input" type="text" placeholder="Ask anything" autocomplete="off" />
          <button id="send-btn" class="send-btn">➤</button>
        </div>
      </div>

      <div class="chat-shell" id="chat-shell"></div>
    </div>
  </div>

  <script>
{{ script }}
  </script>
</body>
</html>
